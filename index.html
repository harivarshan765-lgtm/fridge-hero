<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridge Hero</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #1f2937;
    }

    .card {
      width: min(92vw, 420px);
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.5rem;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 11px 14px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #result {
      margin-top: 16px;
      padding: 12px;
      min-height: 52px;
      border: 1px dashed #93c5fd;
      border-radius: 8px;
      background: #eff6ff;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Fridge Hero</h1>

    <label for="ingredient1">Ingredient 1</label>
    <input id="ingredient1" type="text" placeholder="e.g. Tomato" />

    <label for="ingredient2">Ingredient 2</label>
    <input id="ingredient2" type="text" placeholder="e.g. Onion" />

    <label for="ingredient3">Ingredient 3</label>
    <input id="ingredient3" type="text" placeholder="e.g. Egg" />

    <button id="cookBtn" type="button">Cook Magic</button>

    <div id="result"></div>
  </main>

  <script>
    // Paste your Groq API key here when you are ready.
    const GROQ_API_KEY = "";
    const MODEL = "llama-3.1-8b-instant";

    const ingredient1El = document.getElementById("ingredient1");
    const ingredient2El = document.getElementById("ingredient2");
    const ingredient3El = document.getElementById("ingredient3");
    const cookBtn = document.getElementById("cookBtn");
    const resultEl = document.getElementById("result");

    cookBtn.addEventListener("click", async () => {
      const ingredients = [
        ingredient1El.value.trim(),
        ingredient2El.value.trim(),
        ingredient3El.value.trim()
      ].filter(Boolean);

      if (ingredients.length === 0) {
        resultEl.textContent = "Please enter at least one ingredient.";
        return;
      }

      if (!GROQ_API_KEY) {
        resultEl.textContent =
          "UI ready. Add your Groq API key in GROQ_API_KEY to fetch recipe.";
        return;
      }

      resultEl.textContent = "Cooking magic...";

      try {
        const recipe = await getRecipeFromGroq(ingredients);
        resultEl.textContent = recipe;
      } catch (error) {
        resultEl.textContent = "Error: " + error.message;
      }
    });

    async function getRecipeFromGroq(ingredients) {
      const prompt =
        "Create a quick, simple recipe using these ingredients: " +
        ingredients.join(", ") +
        ". Include a title and 4-6 short steps.";

      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + GROQ_API_KEY
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [{ role: "user", content: prompt }],
          temperature: 0.7
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error("Groq request failed: " + errorText);
      }

      const data = await response.json();
      return data.choices?.[0]?.message?.content || "No recipe returned.";
    }
  </script>
</body>
</html>
